name: PR Title

# The repo squash-merges, so a PR's title becomes the commit subject on main —
# which is what release-please turns into a changelog line and uses to compute
# the version bump. This check enforces that PR titles are valid Conventional
# Commits so the generated changelog reads well and the bump is correct.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commit types release-please understands. feat/fix drive
          # the changelog + version; the rest are valid but release on their own.
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            style
            revert
          # Subject after the type, e.g. "feat: add door-position contact sensor".
          subjectPattern: ^[A-Za-z].+[^.]$
          subjectPatternError: |
            The PR title subject must start with a letter and not end with a period.
            Example: "feat: add door-position contact sensor"
